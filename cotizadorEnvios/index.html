<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador de Envíos - Samcor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-100 p-6 font-sans">

    <div class="max-w-3xl mx-auto bg-white p-8 rounded-lg shadow-md mt-8 border-t-4 border-blue-600">
        <h2 class="text-xl font-bold text-gray-800 mb-6">Cotizador de Envíos Multi-Agencia</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- Panel de Controles -->
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Agencia de Transporte</label>
                    <select id="agencia" class="mt-1 block w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 bg-blue-50">
                        <option value="ecoex">Ecoex</option>
                        <option value="tvp">TVP</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Zona de Destino</label>
                    <select id="zona" class="mt-1 block w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                        <!-- Las opciones se inyectan vía JS -->
                    </select>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Ancho</label>
                        <input type="number" id="ancho" value="205" class="mt-1 w-full p-2 border rounded-md">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Perfil</label>
                        <input type="number" id="perfil" value="55" class="mt-1 w-full p-2 border rounded-md">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Aro</label>
                        <input type="number" id="aro" value="16" class="mt-1 w-full p-2 border rounded-md">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Peso Físico c/u (kg)</label>
                        <input type="number" id="pesoFisico" value="9" class="mt-1 w-full p-2 border rounded-md">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Cantidad</label>
                        <input type="number" id="cantidad" value="4" class="mt-1 w-full p-2 border rounded-md">
                    </div>
                </div>
            </div>

            <!-- Panel de Resultados -->
            <div class="bg-gray-50 p-6 rounded-lg border border-gray-200 flex flex-col justify-center">
                <h3 class="text-md font-semibold text-gray-700 mb-3 border-b pb-2">Análisis de Carga</h3>
                
                <div class="flex justify-between mb-1">
                    <span class="text-sm text-gray-600">Físico Total:</span>
                    <span id="resFisico" class="font-medium text-sm">0 kg</span>
                </div>
                <div class="flex justify-between mb-3">
                    <span class="text-sm text-gray-600">Volumétrico Total:</span>
                    <span id="resVolumetrico" class="font-medium text-sm">0 kg</span>
                </div>

                <div class="mt-2 pt-2 border-t border-gray-200">
                    <span class="block text-xs text-gray-500">Kilos Facturables (El mayor)</span>
                    <span id="resFacturable" class="text-lg font-bold text-gray-800">0 kg</span>
                </div>

                <div class="mt-4 bg-blue-100 p-3 rounded-md text-center">
                    <span id="labelCosto" class="block text-xs font-bold text-blue-800 mb-1">Costo Final (IVA inc.)</span>
                    <span id="resPrecio" class="text-2xl font-extrabold text-blue-900">$0</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
